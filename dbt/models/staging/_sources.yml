version: 2

sources:
  - name: raw
    description: Raw landed data from public APIs (EL layer).
    schema: raw
    tables:
      - name: comexstat_exports
        description: Brazilian agribusiness exports — month x NCM x destination x origin state.
        loaded_at_field: loaded_at
        # Phase 4: enable freshness once ingestion runs on a schedule.
        # freshness:
        #   warn_after: { count: 35, period: day }
      - name: ncm_reference
        description: Agribusiness NCM code -> commodity group + description (product dimension).
      - name: bcb_series
        description: BCB SGS economic time series (USD/BRL, IPCA, SELIC).
      - name: commodity_prices
        description: FRED monthly commodity benchmark prices in USD (soja, milho, cafe, acucar, boi).
